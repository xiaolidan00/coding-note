    <script>
        function travelGeo(geojson, cb) {
            geojson.features.forEach((a) => {
                if (a.geometry.type === "MultiPolygon") {
                    a.geometry.coordinates.forEach((b) => {
                        b.forEach((c) => {
                            cb(c);
                        });
                    });
                } else {
                    a.geometry.coordinates.forEach((c) => {
                        cb(c);
                    });
                }
            });
        }
        function download(filename, res) {
            const url = URL.createObjectURL(new File([JSON.stringify(res)], filename));
            const a = document.createElement("a");
            a.style = "display: none";
            a.download = filename;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
